<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Anime Library</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body { background:#000; color:#fff; }
.card { background:#111; }

/* fixes */
@media(max-width:768px){
  body{ padding-bottom:80px; }
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<div id="header"></div>

<main class="flex-1 max-w-6xl mx-auto px-4 py-6 space-y-6">

<input id="search" placeholder="Search anime..."
class="w-full bg-[#111] border border-gray-700 rounded-xl px-4 py-3">

<select id="sort"
class="bg-[#111] border border-gray-700 rounded-xl px-4 py-2">
  <option value="date">Release Date</option>
  <option value="pop">Popularity</option>
  <option value="rating">Rating</option>
  <option value="title">Title A-Z</option>
</select>

<div id="grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5"></div>
<div id="pagination" class="flex justify-center gap-2 mt-6"></div>

</main>

<script>
const JSON_URL = "https://raw.githubusercontent.com/18otaku/streamtape-json/main/ha.json";
const API = "https://graphql.anilist.co";

const PER_PAGE = 20;
let PAGE = 1;
let DATA = [];

const grid = document.getElementById("grid");
const searchInput = document.getElementById("search");
const sortSelect = document.getElementById("sort");

/* HEADER FIX */
fetch("header.html")
  .then(r=>r.text())
  .then(h=>{
    document.getElementById("header").innerHTML = h;
    setTimeout(()=>{
      const header = document.querySelector(".neek-header");
      if(header){
        document.body.style.paddingTop = header.offsetHeight+"px";
      }
    },100);
  });

/* DATE */
function extractDate(t){
  const m = t.match(/\[(\w+ \d{1,2}, \d{4})\]/);
  return m ? new Date(m[1]) : null;
}

/* LOAD */
(async function(){

  const json = await fetch(JSON_URL).then(r=>r.json());

  const map = {};

  json.files.forEach(f=>{
    const key = f.mal_id || f.anilist_id;
    if(!key) return;

    if(!map[key]){
      map[key] = {...f, count:1, latestDate:extractDate(f.title)};
    } else {
      map[key].count++;
    }
  });

  const list = Object.values(map);

  // 🔥 IMPORTANT: no filtering out
  const results = await Promise.all(list.map(async a=>{
    let api = null;

    try{
      const query = a.mal_id
        ? `query($idMal:Int){Media(idMal:$idMal,type:ANIME){title{romaji english}coverImage{large}averageScore popularity startDate{year} episodes}}`
        : `query($id:Int){Media(id:$id,type:ANIME){title{romaji english}coverImage{large}averageScore popularity startDate{year} episodes}}`;

      const vars = a.mal_id ? {idMal:+a.mal_id} : {id:+a.anilist_id};

      const r = await fetch(API,{
        method:"POST",
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({query,variables:vars})
      });

      api = (await r.json()).data?.Media;

    } catch {}

    return {raw:a,api};
  }));

  DATA = results; // 🔥 keep everything

  render();

})();

/* LINK */
function link(a){
  if(a.mal_id) return `anime.html?malid=${a.mal_id}`;
  if(a.anilist_id) return `anime.html?anilisid=${a.anilist_id}`;
}

/* CARD */
function card(x){

  const api = x.api;
  const raw = x.raw;

  const title = api?.title?.english || api?.title?.romaji || "Unknown Anime";
  const img = api?.coverImage?.large || "https://via.placeholder.com/300x450?text=No+Image";
  const rating = api?.averageScore ? (api.averageScore/10).toFixed(1) : "N/A";
  const year = api?.startDate?.year || "—";

  return `
  <a href="${link(raw)}" class="card rounded-xl overflow-hidden">
    <img src="${img}" class="w-full h-72 object-cover">
    <div class="p-2">
      <p class="text-sm">${title}</p>
      <p class="text-xs text-gray-400">
        ${year} | ${raw.count}/? eps | ⭐ ${rating}
      </p>
    </div>
  </a>`;
}

/* FILTER + SORT */
function getFiltered(){

  let arr = [...DATA];

  const q = searchInput.value.toLowerCase();

  if(q){
    arr = arr.filter(x=>{
      const t = (x.api?.title?.english || x.api?.title?.romaji || "").toLowerCase();
      return t.includes(q);
    });
  }

  switch(sortSelect.value){
    case "pop":
      arr.sort((a,b)=>(b.api?.popularity||0)-(a.api?.popularity||0));
      break;
    case "rating":
      arr.sort((a,b)=>(b.api?.averageScore||0)-(a.api?.averageScore||0));
      break;
    case "title":
      arr.sort((a,b)=>{
        const ta = (a.api?.title?.english||a.api?.title?.romaji||"");
        const tb = (b.api?.title?.english||b.api?.title?.romaji||"");
        return ta.localeCompare(tb);
      });
      break;
    default:
      arr.sort((a,b)=>(b.api?.startDate?.year||0)-(a.api?.startDate?.year||0));
  }

  return arr;
}

/* RENDER */
function render(){

  const arr = getFiltered();

  const start = (PAGE-1)*PER_PAGE;
  const paginated = arr.slice(start, start+PER_PAGE);

  grid.innerHTML = paginated.map(card).join("");

  renderPagination(arr.length);
}

/* PAGINATION */
function renderPagination(total){

  const pages = Math.ceil(total/PER_PAGE);

  let html = "";

  for(let i=1;i<=pages;i++){
    html += `<button onclick="gotoPage(${i})"
    class="px-3 py-1 ${i===PAGE?'bg-red-500':'bg-gray-800'}">${i}</button>`;
  }

  document.getElementById("pagination").innerHTML = html;
}

function gotoPage(p){
  PAGE = p;
  render();
  window.scrollTo({top:0});
}

/* EVENTS */
searchInput.addEventListener("input",()=>{PAGE=1;render();});
sortSelect.addEventListener("change",()=>{PAGE=1;render();});

</script>

</body>
</html>
