<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neek — Anime</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --accent:#ff4444;
      --bg:#0b0b0b;
      --muted:#9b9b9b;
    }

    html,body {
      background:var(--bg);
      color:#fff;
    }

    .card { background:#1a1a1a; }
    .star { color:var(--accent); }
  </style>
</head>

<body class="min-h-screen flex flex-col">

<!-- Header -->
<div id="header"></div>

<main class="flex-1 max-w-6xl mx-auto px-4 py-10 space-y-10">

  <h1 class="text-3xl font-bold flex items-center gap-2">
    <i class="fa-solid fa-dragon text-[--accent]"></i> Anime Library
  </h1>

  <div id="anime-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5"></div>

</main>

<!-- Footer -->
<div id="footer"></div>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  // Load header/footer
  Promise.all([
    fetch("header.html").then(r => r.text()),
    fetch("footer.html").then(r => r.text())
  ]).then(([h,f])=>{
    document.getElementById("header").innerHTML = h;
    document.getElementById("footer").innerHTML = f;
  });

  const JSON_URL = "https://raw.githubusercontent.com/18otaku/streamtape-json/main/ha.json";
  const ANILIST_API = "https://graphql.anilist.co";

  const grid = document.getElementById("anime-grid");

  // Fetch your JSON
  const res = await fetch(JSON_URL);
  const data = await res.json();

  // Get unique anime IDs
  const unique = {};
  data.files.forEach(file => {
    const id = file.mal_id || file.anilist_id;
    if (id && !unique[id]) {
      unique[id] = file;
    }
  });

  const animeList = Object.values(unique).slice(0, 20);

  async function fetchAniList(anime) {
    let query, variables;

    if (anime.anilist_id) {
      query = `
        query ($id: Int) {
          Media(id: $id, type: ANIME) {
            id
            title { romaji english }
            coverImage { large }
            averageScore
            startDate { year }
            episodes
          }
        }
      `;
      variables = { id: anime.anilist_id };

    } else {
      // MAL -> AniList
      query = `
        query ($idMal: Int) {
          Media(idMal: $idMal, type: ANIME) {
            id
            title { romaji english }
            coverImage { large }
            averageScore
            startDate { year }
            episodes
          }
        }
      `;
      variables = { idMal: parseInt(anime.mal_id) };
    }

    try {
      const res = await fetch(ANILIST_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query, variables })
      });

      const json = await res.json();
      return json.data.Media;

    } catch {
      return null;
    }
  }

  function createCard(a) {
    const title = a.title.english || a.title.romaji;
    const poster = a.coverImage?.large || "";
    const rating = a.averageScore ? (a.averageScore / 10).toFixed(1) : "N/A";
    const year = a.startDate?.year || "—";
    const episodes = a.episodes || "?";

    return `
      <div class="card rounded-xl overflow-hidden hover:scale-105 transition">
        <img src="${poster}" class="w-full h-72 object-cover">
        <div class="p-3">
          <h3 class="text-sm font-medium line-clamp-2">${title}</h3>
          <p class="text-xs text-gray-400 mt-1">
            ${year} | ${episodes} eps | 
            <i class="fa fa-star star"></i> ${rating}
          </p>
        </div>
      </div>
    `;
  }

  // Fetch all anime data
  const promises = animeList.map(fetchAniList);
  const results = await Promise.all(promises);

  const cards = results
    .filter(a => a !== null)
    .map(createCard);

  grid.innerHTML = cards.join("");

});
</script>

</body>
</html>
