<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neek — Anime</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body { background:#000; color:#fff; }
    a { color:#fff !important; text-decoration:none !important; }
    .card { background:#111; }
    .accent { color:#ff4444; }
  </style>
</head>

<body class="min-h-screen flex flex-col">

<div id="header"></div>

<main class="flex-1 max-w-6xl mx-auto px-4 py-10 space-y-16">

  <section>
    <h2 class="text-2xl font-bold mb-6 flex gap-2">
      <i class="fa-solid fa-bolt accent"></i> New Releases
    </h2>
    <div id="new-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5"></div>
  </section>

  <section>
    <h2 class="text-2xl font-bold mb-6 flex gap-2">
      <i class="fa-solid fa-fire accent"></i> Popular Anime
    </h2>
    <div id="popular-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5"></div>
  </section>

  <section>
    <h2 class="text-2xl font-bold mb-6 flex gap-2">
      <i class="fa-solid fa-folder accent"></i> Anime Library
    </h2>
    <div id="library-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5"></div>
  </section>

</main>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const JSON_URL = "https://raw.githubusercontent.com/18otaku/streamtape-json/main/ha.json";
  const API = "https://graphql.anilist.co";

  const CACHE_KEY = "anime_cache_v4";
  const CACHE_TIME = 86400000;

  const FALLBACK = "https://via.placeholder.com/300x450?text=No+Image";

  const newGrid = document.getElementById("new-grid");
  const popGrid = document.getElementById("popular-grid");
  const libGrid = document.getElementById("library-grid");

  /* ================= HEADER SAFE ================= */
  try {
    const el = document.getElementById("header");
    const h = await fetch("header.html").then(r => r.text());
    if (el) el.innerHTML = h;
  } catch {}

  /* ================= SAFE FETCH ================= */
  async function safeFetch(url, options){
    try {
      const r = await fetch(url, options);
      if (!r.ok) return null;
      return await r.json();
    } catch {
      return null;
    }
  }

  /* ================= LIMITER ================= */
  function limit(n){
    let active = 0;
    let queue = [];

    const next = () => {
      if (active >= n || queue.length === 0) return;

      active++;
      const {fn, resolve} = queue.shift();

      fn()
        .then(resolve)
        .catch(() => resolve(null))
        .finally(() => {
          active--;
          next();
        });
    };

    return (fn) => new Promise(resolve => {
      queue.push({fn, resolve});
      next();
    });
  }

  const run = limit(3);

  /* ================= LOAD JSON ================= */
  const json = await safeFetch(JSON_URL);

  if (!json?.files) {
    newGrid.innerHTML = "<p>Failed to load data</p>";
    return;
  }

  const map = {};

  json.files.forEach(f => {
    const key = f.mal_id || f.anilist_id;
    if (!key) return;

    if (!map[key]) map[key] = { ...f, count: 1 };
    else map[key].count++;
  });

  const list = Object.values(map);

  /* ================= CACHE ================= */
  let cache = {};
  try {
    cache = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}");
  } catch {}

  function saveCache(){
    localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
  }

  /* ================= ANI FETCH ================= */
  async function fetchAni(a){

    const key = a.mal_id || a.anilist_id;

    if (cache[key] && Date.now() - cache[key].t < CACHE_TIME) {
      return cache[key].d;
    }

    const query = a.mal_id
      ? `query($idMal:Int){Media(idMal:$idMal,type:ANIME){title{romaji english}coverImage{large}averageScore popularity startDate{year} episodes}}`
      : `query($id:Int){Media(id:$id,type:ANIME){title{romaji english}coverImage{large}averageScore popularity startDate{year} episodes}}`;

    const vars = a.mal_id ? {idMal:+a.mal_id} : {id:+a.anilist_id};

    const res = await safeFetch(API, {
      method: "POST",
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({query, variables: vars})
    });

    const d = res?.data?.Media || null;

    if (d) {
      cache[key] = {d, t: Date.now()};
      saveCache();
    }

    return d;
  }

  function link(a){
    if (a.mal_id) return `anime.html?malid=${a.mal_id}`;
    if (a.anilist_id) return `anime.html?anilisid=${a.anilist_id}`;
    return "#";
  }

  /* ================= NORMAL CARD ================= */
  function card(api, raw){

    const title = api.title?.english || api.title?.romaji || "Unknown";
    const img = api.coverImage?.large || FALLBACK;
    const rating = api.averageScore ? (api.averageScore/10).toFixed(1) : "N/A";
    const year = api.startDate?.year || "—";

    return `
    <a href="${link(raw)}"
       class="card block rounded-xl overflow-hidden">

      <img src="${img}" onerror="this.src='${FALLBACK}'"
        class="w-full h-72 object-cover">

      <div class="p-3">
        <h3 class="text-sm">${title}</h3>
        <p class="text-xs text-gray-400">
          ${year} | ${raw.count}/${api.episodes||'?'} eps | ⭐ ${rating}
        </p>
      </div>
    </a>`;
  }

  /* ================= VIEW ALL CARD ================= */
  function viewAllCard(){
    return `
    <a href="library.html"
       class="card block relative rounded-xl overflow-hidden group">

      <img src="${FALLBACK}"
        class="w-full h-72 object-cover brightness-50">

      <div class="absolute inset-0 flex items-center justify-center font-bold text-lg bg-black/40 group-hover:bg-black/60 transition">
        VIEW ALL →
      </div>

    </a>`;
  }

  /* ================= SAFE LOOP ================= */
  const apiData = [];

  for (let i = 0; i < list.length; i++) {
    const d = await run(() => fetchAni(list[i]));
    apiData.push(d);

    if (i % 20 === 0) render();
  }

  function buildGrid(items, withViewAll=false){

    const cards = items.slice(0, 9).map(x => card(x.api, x.raw));

    if (withViewAll) cards.push(viewAllCard());

    return cards.join("");
  }

  function render(){

    const merged = list
      .map((a,i)=>({raw:a, api:apiData[i]}))
      .filter(x => x.api);

    newGrid.innerHTML = buildGrid(merged, false);
    popGrid.innerHTML = buildGrid(merged, false);
    libGrid.innerHTML = buildGrid(merged, true); // 🔥 ONLY HERE VIEW ALL
  }

  render();

});
</script>

</body>
</html>
