<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Neek — Anime</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      background: #000;
      color: #fff;
    }

    a {
      text-decoration: none !important;
      color: white !important;
    }

    .card {
      background: #111;
    }

    .accent {
      color: #ff4444;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col">

<!-- Header -->
<div id="header"></div>

<main class="flex-1 max-w-6xl mx-auto px-4 py-10 space-y-16">

  <!-- NEW RELEASES -->
  <section>
    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
      <i class="fa-solid fa-bolt accent"></i> New Releases
    </h2>
    <div id="new-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5"></div>
  </section>

  <!-- POPULAR -->
  <section>
    <h2 class="text-2xl font-bold mb-6 flex items-center gap-2">
      <i class="fa-solid fa-fire accent"></i> Popular Anime
    </h2>
    <div id="popular-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5"></div>
  </section>

  <!-- LIBRARY -->
  <section>
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-2xl font-bold flex items-center gap-2">
        <i class="fa-solid fa-folder accent"></i> Anime Library
      </h2>
      <a href="/library.html" class="text-sm hover:text-red-400">View All →</a>
    </div>
    <div id="library-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-5"></div>
  </section>

</main>

<script>
document.addEventListener("DOMContentLoaded", async () => {

  const JSON_URL = "https://raw.githubusercontent.com/18otaku/streamtape-json/main/ha.json";
  const ANILIST_API = "https://graphql.anilist.co";

  const newGrid = document.getElementById("new-grid");
  const popGrid = document.getElementById("popular-grid");
  const libGrid = document.getElementById("library-grid");

  // Load header ONLY
  fetch("header.html")
    .then(r => r.text())
    .then(h => document.getElementById("header").innerHTML = h);

  // Fetch JSON
  const res = await fetch(JSON_URL);
  const data = await res.json();

  // Extract date from filename
  function extractDate(title) {
    const match = title.match(/\[(\w+ \d{1,2}, \d{4})\]/);
    return match ? new Date(match[1]) : null;
  }

  // Build anime map (FIXED)
  const map = {};

  data.files.forEach(file => {
    const key =
      file.mal_id ||
      file.anilist_id ||
      file.tmdb_id ||
      file.tmdbs_id;

    if (!key) return;

    if (!map[key]) {
      map[key] = {
        ...file,
        latestDate: extractDate(file.title),
        count: 1
      };
    } else {
      map[key].count++;

      const d = extractDate(file.title);
      if (d && (!map[key].latestDate || d > map[key].latestDate)) {
        map[key].latestDate = d;
      }
    }
  });

  const animeList = Object.values(map);

  // NEW RELEASES (latest by date)
  const newReleases = [...animeList]
    .filter(a => a.latestDate)
    .sort((a, b) => b.latestDate - a.latestDate)
    .slice(0, 10);

  // AniList fetch
  async function fetchAniList(anime) {
    let query, variables;

    if (anime.anilist_id) {
      query = `query($id:Int){
        Media(id:$id,type:ANIME){
          id
          title{romaji english}
          coverImage{large}
          averageScore
          startDate{year}
          episodes
        }
      }`;
      variables = { id: anime.anilist_id };

    } else if (anime.mal_id) {
      query = `query($idMal:Int){
        Media(idMal:$idMal,type:ANIME){
          id
          title{romaji english}
          coverImage{large}
          averageScore
          startDate{year}
          episodes
        }
      }`;
      variables = { idMal: parseInt(anime.mal_id) };

    } else {
      return null;
    }

    try {
      const res = await fetch(ANILIST_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query, variables })
      });

      const json = await res.json();
      return json.data.Media;

    } catch {
      return null;
    }
  }

  // Routing links
  function getLink(a) {
    if (a.mal_id) return `/anime.html?malid=${a.mal_id}`;
    if (a.anilist_id) return `/anime.html?anilisid=${a.anilist_id}`;
    if (a.tmdb_id) return `/anime.html?tmdbid=${a.tmdb_id}`;
    if (a.tmdbs_id) return `/anime.html?tmdbsid=${a.tmdbs_id}`;
    return "#";
  }

  // Card UI
  function createCard(api, raw) {
    if (!api) return "";

    const title = api.title.english || api.title.romaji;
    const img = api.coverImage?.large || "";
    const rating = api.averageScore ? (api.averageScore / 10).toFixed(1) : "N/A";
    const year = api.startDate?.year || "—";

    const current = raw.count;
    const total = api.episodes || "?";

    return `
      <a href="${getLink(raw)}"
         class="card rounded-xl overflow-hidden hover:scale-105 transition block">

        <img src="${img}" class="w-full h-72 object-cover">

        <div class="p-3">
          <h3 class="text-sm line-clamp-2 text-white">
            ${title}
          </h3>

          <p class="text-xs text-gray-400 mt-1">
            ${year} | ${current}/${total} eps | ⭐ ${rating}
          </p>
        </div>

      </a>
    `;
  }

  // Render sections

  // NEW
  const newData = await Promise.all(newReleases.map(fetchAniList));
  newGrid.innerHTML = newData
    .map((d, i) => createCard(d, newReleases[i]))
    .join("");

  // POPULAR (basic for now)
  const popular = animeList.slice(0, 15);
  const popData = await Promise.all(popular.map(fetchAniList));
  popGrid.innerHTML = popData
    .slice(0, 10)
    .map((d, i) => createCard(d, popular[i]))
    .join("");

  // LIBRARY (FIXED)
  const library = animeList.slice(0, 10);
  const libData = await Promise.all(library.map(fetchAniList));
  libGrid.innerHTML = libData
    .map((d, i) => createCard(d, library[i]))
    .join("");

});
</script>

</body>
</html>
