<script>
document.addEventListener("DOMContentLoaded", async () => {

  const JSON_URL = "https://raw.githubusercontent.com/18otaku/streamtape-json/main/ha.json";
  const API = "https://graphql.anilist.co";

  const CACHE_KEY = "anime_cache_v2";
  const CACHE_TIME = 86400000;

  const FALLBACK = "https://via.placeholder.com/300x450?text=No+Image";

  const newGrid = document.getElementById("new-grid");
  const popGrid = document.getElementById("popular-grid");
  const libGrid = document.getElementById("library-grid");

  /* =========================
     HEADER SAFE LOAD
  ========================= */
  fetch("header.html")
    .then(r => r.text())
    .then(h => {
      const el = document.getElementById("header");
      if (el) el.innerHTML = h;
    })
    .catch(() => {});

  /* =========================
     SAFE FETCH WITH RETRY
  ========================= */
  async function fetchWithRetry(url, options = {}, retries = 3){
    for(let i=0;i<=retries;i++){
      try{
        const r = await fetch(url, options);
        if(!r.ok) throw new Error("HTTP " + r.status);
        return await r.json();
      }catch(e){
        if(i === retries) return null;
        await new Promise(res => setTimeout(res, 400 * (i+1)));
      }
    }
    return null;
  }

  /* =========================
     CONCURRENCY LIMITER (CRITICAL FIX)
  ========================= */
  function limitConcurrency(limit){
    let active = 0;
    let queue = [];

    const next = () => {
      if(active >= limit || queue.length === 0) return;

      active++;
      const {fn, resolve} = queue.shift();

      fn().then(resolve).catch(() => resolve(null)).finally(() => {
        active--;
        next();
      });
    };

    return (fn) => new Promise(resolve => {
      queue.push({fn, resolve});
      next();
    });
  }

  const runLimited = limitConcurrency(4); // VERY IMPORTANT

  /* =========================
     LOAD JSON
  ========================= */
  const json = await fetchWithRetry(JSON_URL);
  if(!json?.files){
    newGrid.innerHTML = "Failed to load data";
    return;
  }

  /* =========================
     BUILD MAP
  ========================= */
  function extractDate(t) {
    const m = t.match(/\[(\w+ \d{1,2}, \d{4})\]/);
    return m ? new Date(m[1]) : new Date(0);
  }

  const map = {};
  json.files.forEach(f=>{
    const key = f.mal_id || f.anilist_id;
    if (!key) return;

    if (!map[key]) {
      map[key] = { ...f, count:1, latestDate: extractDate(f.title) };
    } else {
      map[key].count++;
    }
  });

  const animeList = Object.values(map);

  /* =========================
     CACHE
  ========================= */
  let cache = {};
  try{
    cache = JSON.parse(localStorage.getItem(CACHE_KEY) || "{}");
  }catch{}

  function saveCache(){
    localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
  }

  /* =========================
     ANI FETCH (SAFE)
  ========================= */
  async function fetchAni(a){

    const key = a.mal_id || a.anilist_id;

    if (cache[key] && Date.now() - cache[key].t < CACHE_TIME) {
      return cache[key].d;
    }

    const query = a.mal_id
      ? `query($idMal:Int){Media(idMal:$idMal,type:ANIME){title{romaji english}coverImage{large}averageScore popularity startDate{year} episodes}}`
      : `query($id:Int){Media(id:$id,type:ANIME){title{romaji english}coverImage{large}averageScore popularity startDate{year} episodes}}`;

    const vars = a.mal_id ? {idMal:+a.mal_id} : {id:+a.anilist_id};

    const res = await fetchWithRetry(API,{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({query,variables:vars})
    });

    const d = res?.data?.Media;

    if(d){
      cache[key] = {d,t:Date.now()};
      saveCache();
    }

    return d;
  }

  function link(a){
    if(a.mal_id) return `anime.html?malid=${a.mal_id}`;
    if(a.anilist_id) return `anime.html?anilisid=${a.anilist_id}`;
    return "#";
  }

  function card(api, raw, blur=false){
    if(!api){
      return `
      <div class="card rounded-xl overflow-hidden opacity-40">
        <img src="${FALLBACK}" class="w-full h-72 object-cover">
        <div class="p-3 text-xs">Loading failed</div>
      </div>`;
    }

    const title = api.title?.english || api.title?.romaji || "Unknown";
    const img = api.coverImage?.large || FALLBACK;
    const rating = api.averageScore ? (api.averageScore/10).toFixed(1) : "N/A";
    const year = api.startDate?.year || "—";

    return `
    <a href="${blur?'library.html':link(raw)}"
       class="card block relative rounded-xl overflow-hidden">

      <img src="${img}" onerror="this.src='${FALLBACK}'"
        class="w-full h-72 object-cover ${blur?'blur-sm brightness-50':''}">

      ${blur?'<div class="absolute inset-0 flex items-center justify-center font-bold">VIEW ALL →</div>':''}

      <div class="p-3">
        <h3 class="text-sm line-clamp-2">${title}</h3>
        <p class="text-xs text-gray-400">
          ${year} | ${raw.count}/${api.episodes||'?'} eps | ⭐ ${rating}
        </p>
      </div>
    </a>`;
  }

  /* =========================
     PROCESS WITH LIMIT (FIX)
  ========================= */

  const apiData = [];

  for(let i=0;i<animeList.length;i++){
    const item = await runLimited(() => fetchAni(animeList[i]));
    apiData.push(item);

    // progressive render (important UX fix)
    if(i % 20 === 0){
      renderPartial();
    }
  }

  const merged = animeList
    .map((a,i)=>({raw:a,api:apiData[i]}))
    .filter(x=>x.raw); // don't kill UI

  /* =========================
     RENDER SAFE
  ========================= */

  function renderPartial(){

    const safe = animeList.slice(0, Math.min(apiData.length, animeList.length))
      .map((a,i)=>({raw:a,api:apiData[i]}))
      .filter(x=>x.api);

    renderBlocks(safe);
  }

  function renderBlocks(merged){

    const newList = [...merged]
      .sort((a,b)=>b.raw.latestDate - a.raw.latestDate)
      .slice(0,10);

    newGrid.innerHTML = newList.map(x=>card(x.api,x.raw)).join("");

    const pop = [...merged]
      .sort((a,b)=>(b.api?.popularity||0)-(a.api?.popularity||0))
      .slice(0,10);

    popGrid.innerHTML = pop.map(x=>card(x.api,x.raw)).join("");

    const lib = [...merged]
      .sort((a,b)=>(b.api?.startDate?.year||0)-(a.api?.startDate?.year||0))
      .slice(0,10);

    libGrid.innerHTML = lib.map((x,i)=>
      i===9 ? card(x.api,x.raw,true) : card(x.api,x.raw)
    ).join("");
  }

  renderBlocks(merged);

});
</script>
