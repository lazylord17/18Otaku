<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Episodes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-[#0b0b0b] text-white min-h-screen p-6">

  <h1 class="text-3xl font-bold mb-6 text-center">Anime Episodes</h1>

  <!-- 🔍 Search -->
  <div class="max-w-xl mx-auto mb-6">
    <input id="searchInput"
      type="text"
      placeholder="Search anime..."
      class="w-full px-4 py-2 rounded-lg bg-[#1a1a1a] border border-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
  </div>

  <p id="status" class="text-center text-gray-400 mb-6">Loading...</p>

  <!-- 🎬 Grid -->
  <div id="videoList"
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
  </div>

<script>
const encodedUser = "Y2VlZDRmZWM2ZjU1MWY0Y2NjNWI=";
const encodedPass = "YnplMDhScExRbGNQdlpS";

const username = atob(encodedUser);
const password = atob(encodedPass);

const apiUrl = `https://api.streamtape.com/file/listfolder?login=${username}&key=${password}`;

let allEpisodes = [];
let filteredEpisodes = [];

// 🧠 Parse filename
function parseName(name) {
  const regex = /\[(\d+)-(\d+)\]\s*\[(.*?)\]\s*\[(.*?)\]/;
  const match = name.match(regex);

  if (!match) return null;

  return {
    malId: match[1],
    episode: parseInt(match[2]),
    title: match[3],
    date: new Date(match[4])
  };
}

// 📡 Fetch MAL data
async function fetchAnimeDetails(malId) {
  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
    const data = await res.json();

    return {
      title: data.data.title,
      image: data.data.images.jpg.image_url
    };
  } catch {
    return {
      title: "Unknown",
      image: "https://via.placeholder.com/300x450?text=No+Image"
    };
  }
}

// 🎬 Render
function render() {
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  filteredEpisodes.forEach(ep => {
    const div = document.createElement("div");

    div.className = "bg-[#1a1a1a] rounded-xl overflow-hidden hover:scale-105 transition cursor-pointer";

    div.innerHTML = `
      <img src="${ep.image}"
        class="w-full h-[260px] object-cover">

      <div class="p-2">
        <h2 class="text-sm font-semibold truncate">
          ${ep.animeTitle}
        </h2>

        <p class="text-xs text-gray-400">
          Episode ${ep.episode}
        </p>

        <p class="text-xs text-gray-500">
          ${ep.date.toDateString()}
        </p>

        <button onclick="watch('${ep.linkid}')"
          class="mt-2 w-full bg-blue-500 hover:bg-blue-600 py-1 rounded text-xs">
          ▶ Watch
        </button>
      </div>
    `;

    container.appendChild(div);
  });
}

// 🔎 Search filter
function applySearch() {
  const query = document.getElementById("searchInput").value.toLowerCase();

  filteredEpisodes = allEpisodes.filter(ep =>
    ep.animeTitle.toLowerCase().includes(query)
  );

  render();
}

// ▶ Watch
function watch(id) {
  window.open(`https://streamtape.com/e/${id}`, "_blank");
}

// 🚀 INIT
(async () => {
  try {
    const res = await fetch(apiUrl);
    const data = await res.json();

    if (!data.result || !data.result.files) {
      document.getElementById("status").innerText = "No videos found.";
      return;
    }

    const files = data.result.files;

    // Parse all
    const parsed = files.map(f => {
      const info = parseName(f.name);
      if (!info) return null;

      return {
        ...info,
        linkid: f.linkid
      };
    }).filter(Boolean);

    // Fetch anime details (unique MAL IDs)
    const uniqueIds = [...new Set(parsed.map(p => p.malId))];

    const animeMap = {};

    for (let id of uniqueIds) {
      animeMap[id] = await fetchAnimeDetails(id);
    }

    // Merge data
    allEpisodes = parsed.map(ep => ({
      ...ep,
      animeTitle: animeMap[ep.malId].title,
      image: animeMap[ep.malId].image
    }));

    // 🗂 Sort by date DESC
    allEpisodes.sort((a,b) => b.date - a.date);

    filteredEpisodes = allEpisodes;

    document.getElementById("status").innerText =
      `Found ${allEpisodes.length} episode(s)`;

    render();

  } catch (err) {
    console.error(err);
    document.getElementById("status").innerText = "Error loading data.";
  }
})();

// 🔍 Event
document.getElementById("searchInput")
  .addEventListener("input", applySearch);

</script>

</body>
</html>
