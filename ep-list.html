<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Episodes</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    :root {
      --accent: #ff4444;
    }
  </style>
</head>

<body class="bg-[#0b0b0b] text-white min-h-screen p-6">

  <!-- Title -->
  <h1 class="text-3xl font-bold text-center mb-6">
    Anime Episodes
  </h1>

  <!-- Search -->
  <div class="max-w-xl mx-auto mb-8">
    <input id="searchInput"
      type="text"
      placeholder="Search anime..."
      class="w-full px-4 py-2 rounded-lg bg-[#1a1a1a] border border-gray-700 focus:outline-none focus:ring-2 focus:ring-[--accent]">
  </div>

  <!-- Grid -->
  <div id="videoList"
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
  </div>

  <!-- 🎬 MODAL -->
  <div id="modal"
    class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">

    <div class="bg-[#111] rounded-xl w-full max-w-5xl overflow-hidden relative">

      <!-- Close -->
      <button onclick="closeModal()"
        class="absolute top-3 right-3 text-white text-xl z-10">
        ✕
      </button>

      <!-- Title -->
      <div id="modalTitle"
        class="p-4 font-semibold text-lg border-b border-gray-800">
      </div>

      <!-- Player -->
      <iframe id="modalPlayer"
        class="w-full h-[500px]"
        frameborder="0"
        allowfullscreen>
      </iframe>

    </div>
  </div>

<script>
const encodedUser = "Y2VlZDRmZWM2ZjU1MWY0Y2NjNWI=";
const encodedPass = "YnplMDhScExRbGNQdlpS";

const username = atob(encodedUser);
const password = atob(encodedPass);

const apiUrl = `https://api.streamtape.com/file/listfolder?login=${username}&key=${password}`;

let allEpisodes = [];
let filteredEpisodes = [];

/* Parse filename */
function parseName(name) {
  const regex = /\[(\d+)-(\d+)\]\s*\[(.*?)\]\s*\[(.*?)\]/;
  const match = name.match(regex);

  if (!match) return null;

  return {
    malId: match[1],
    episode: parseInt(match[2]),
    title: match[3],
    date: new Date(match[4])
  };
}

/* Fetch anime (HD image) */
async function fetchAnime(malId) {
  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime/${malId}`);
    const data = await res.json();

    return {
      title: data.data.title,
      image: data.data.images.jpg.large_image_url
    };
  } catch {
    return {
      title: "Unknown",
      image: "https://via.placeholder.com/300x450?text=No+Image"
    };
  }
}

/* Render */
function render() {
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  filteredEpisodes.forEach(ep => {
    const div = document.createElement("div");

    div.className = "relative rounded-xl overflow-hidden group cursor-pointer";

    div.innerHTML = `
      <!-- Poster (FIXED RATIO) -->
      <div class="aspect-[2/3] w-full">
        <img src="${ep.image}"
          class="w-full h-full object-cover">
      </div>

      <!-- Date -->
      <div class="absolute top-2 right-2 bg-black/70 text-xs px-2 py-1 rounded">
        ${ep.date.toLocaleDateString()}
      </div>

      <!-- Bottom Overlay -->
      <div class="absolute bottom-0 left-0 right-0 bg-black/60 backdrop-blur-md p-2">
        <h2 class="text-sm font-semibold truncate">
          ${ep.animeTitle}
        </h2>
        <p class="text-xs text-gray-300">
          Episode ${ep.episode}
        </p>
      </div>

      <!-- Hover Play Icon -->
      <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 flex items-center justify-center transition">
        <div class="border border-white rounded-full p-4">
          ▶
        </div>
      </div>
    `;

    div.onclick = () => openModal(ep);

    container.appendChild(div);
  });
}

/* Search */
function applySearch() {
  const q = document.getElementById("searchInput").value.toLowerCase();

  filteredEpisodes = allEpisodes.filter(ep =>
    ep.animeTitle.toLowerCase().includes(q)
  );

  render();
}

/* Modal */
function openModal(ep) {
  document.getElementById("modalTitle").innerText =
    `${ep.animeTitle} Episode ${ep.episode}`;

  document.getElementById("modalPlayer").src =
    `https://streamtape.com/e/${ep.linkid}`;

  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("modal").classList.remove("flex");
  document.getElementById("modalPlayer").src = "";
}

/* Init */
(async () => {
  try {
    const res = await fetch(apiUrl);
    const data = await res.json();

    if (!data.result || !data.result.files) return;

    const parsed = data.result.files.map(f => {
      const info = parseName(f.name);
      if (!info) return null;

      return {
        ...info,
        linkid: f.linkid
      };
    }).filter(Boolean);

    const uniqueIds = [...new Set(parsed.map(p => p.malId))];
    const animeMap = {};

    for (let id of uniqueIds) {
      animeMap[id] = await fetchAnime(id);
    }

    allEpisodes = parsed.map(ep => ({
      ...ep,
      animeTitle: animeMap[ep.malId].title,
      image: animeMap[ep.malId].image
    }));

    /* Sort by date */
    allEpisodes.sort((a,b) => b.date - a.date);

    filteredEpisodes = allEpisodes;

    render();

  } catch (err) {
    console.error(err);
  }
})();

/* Event */
document.getElementById("searchInput")
  .addEventListener("input", applySearch);

</script>

</body>
</html>
