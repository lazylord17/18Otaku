<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Episodes</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root {
      --accent: #ff4444;
    }
  </style>
</head>

<body class="bg-[#0b0b0b] text-white min-h-screen p-4">

  <h1 class="text-2xl font-semibold text-center mb-6">
    Anime Episodes
  </h1>

  <!-- Search -->
  <div class="max-w-md mx-auto mb-6">
    <input id="searchInput"
      type="text"
      placeholder="Search..."
      class="w-full px-3 py-2 rounded bg-[#1a1a1a] border border-gray-700 focus:outline-none focus:ring-1 focus:ring-[--accent] text-sm">
  </div>

  <!-- Grid -->
  <div id="videoList"
    class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 lg:grid-cols-7 gap-4">
  </div>

  <!-- Modal -->
  <div id="modal"
    class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4">

    <div class="bg-[#111] rounded-lg w-full max-w-4xl overflow-hidden relative">

      <button onclick="closeModal()"
        class="absolute top-3 right-3 text-white text-lg z-10">
        ✕
      </button>

      <div id="modalTitle"
        class="p-3 text-sm border-b border-gray-800">
      </div>

      <iframe id="modalPlayer"
        class="w-full h-[450px]"
        frameborder="0"
        allowfullscreen>
      </iframe>

    </div>
  </div>

<script>
const encodedUser = "Y2VlZDRmZWM2ZjU1MWY0Y2NjNWI=";
const encodedPass = "YnplMDhScExRbGNQdlpS";

const username = atob(encodedUser);
const password = atob(encodedPass);

const apiUrl = `https://api.streamtape.com/file/listfolder?login=${username}&key=${password}`;

let allEpisodes = [];
let filteredEpisodes = [];

/* SAFE PARSER */
function parseName(name) {
  try {
    const regex = /\[(\d+)-(\d+)\]\s*\[(.*?)\]\s*\[(.*?)\]/;
    const match = name.match(regex);

    if (!match) return null;

    return {
      malId: match[1],
      episode: parseInt(match[2]),
      date: new Date(match[4])
    };
  } catch {
    return null;
  }
}

/* FORMAT DATE */
function formatDate(date) {
  return date.toLocaleDateString("en-US", {
    month: "short",
    day: "2-digit",
    year: "numeric"
  });
}

/* FETCH ANIME */
async function fetchAnime(id) {
  try {
    const res = await fetch(`https://api.jikan.moe/v4/anime/${id}`);
    const data = await res.json();

    return {
      title: data.data.title,
      image: data.data.images.jpg.large_image_url
    };
  } catch {
    return {
      title: "Unknown",
      image: "https://via.placeholder.com/300x450"
    };
  }
}

/* RENDER */
function render() {
  const container = document.getElementById("videoList");
  container.innerHTML = "";

  filteredEpisodes.forEach(ep => {
    const div = document.createElement("div");

    div.className = "relative group cursor-pointer";

    div.innerHTML = `
      <div class="aspect-[2/3] w-full overflow-hidden rounded-md">
        <img src="${ep.image}"
          class="w-full h-full object-cover">
      </div>

      <!-- Date -->
      <div class="absolute top-1 right-1 bg-black/70 text-[10px] px-1.5 py-0.5 rounded">
        ${formatDate(ep.date)}
      </div>

      <!-- Bottom -->
      <div class="absolute bottom-0 left-0 right-0 bg-black/60 backdrop-blur-sm p-1">
        <p class="text-xs truncate">${ep.animeTitle}</p>
        <p class="text-[10px] text-gray-300">Ep ${ep.episode}</p>
      </div>

      <!-- Hover -->
      <div class="absolute inset-0 flex items-center justify-center opacity-0 group-hover:opacity-100 bg-black/40 transition">
        <i class="fa-solid fa-play text-white text-lg"></i>
      </div>
    `;

    div.onclick = () => openModal(ep);

    container.appendChild(div);
  });
}

/* SEARCH */
function applySearch() {
  const q = document.getElementById("searchInput").value.toLowerCase();

  filteredEpisodes = allEpisodes.filter(ep =>
    ep.animeTitle.toLowerCase().includes(q)
  );

  render();
}

/* MODAL */
function openModal(ep) {
  document.getElementById("modalTitle").innerText =
    `${ep.animeTitle} Episode ${ep.episode}`;

  document.getElementById("modalPlayer").src =
    `https://streamtape.com/e/${ep.linkid}`;

  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal() {
  document.getElementById("modal").classList.add("hidden");
  document.getElementById("modal").classList.remove("flex");
  document.getElementById("modalPlayer").src = "";
}

/* INIT */
(async () => {
  try {
    const res = await fetch(apiUrl);
    const data = await res.json();

    if (!data.result || !data.result.files) return;

    const parsed = [];

    for (let f of data.result.files) {
      const info = parseName(f.name);
      if (!info) continue; // ✅ skip bad files safely

      parsed.push({
        ...info,
        linkid: f.linkid
      });
    }

    if (parsed.length === 0) {
      document.getElementById("videoList").innerHTML =
        "<p class='text-center col-span-full text-gray-400'>No valid episodes found</p>";
      return;
    }

    const uniqueIds = [...new Set(parsed.map(p => p.malId))];
    const animeMap = {};

    for (let id of uniqueIds) {
      animeMap[id] = await fetchAnime(id);
    }

    allEpisodes = parsed.map(ep => ({
      ...ep,
      animeTitle: animeMap[ep.malId]?.title || "Unknown",
      image: animeMap[ep.malId]?.image
    }));

    /* SORT */
    allEpisodes.sort((a,b) => b.date - a.date);

    filteredEpisodes = allEpisodes;

    render();

  } catch (err) {
    console.error(err);
    document.getElementById("videoList").innerHTML =
      "<p class='text-center col-span-full text-red-400'>Error loading</p>";
  }
})();

/* EVENT */
document.getElementById("searchInput")
  .addEventListener("input", applySearch);

</script>

</body>
</html>
