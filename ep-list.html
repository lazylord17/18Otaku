<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Episodes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

  <h1 class="text-3xl font-bold mb-6">Anime Episodes</h1>

  <!-- Status -->
  <p id="status" class="text-gray-400 mb-4">Loading...</p>

  <!-- Video List -->
  <div id="videoList" class="grid gap-4"></div>

  <script>
    // 🔐 Encoded credentials (Base64 - basic obfuscation)
    const encodedUser = "Y2VlZDRmZWM2ZjU1MWY0Y2NjNWI=";
    const encodedPass = "YnplMDhScExRbGNQdlpS";

    function decode(str) {
      return atob(str);
    }

    const username = decode(encodedUser);
    const password = decode(encodedPass);

    // ✅ FIX: added folder=0
    const apiUrl = `https://api.streamtape.com/file/list?login=${username}&key=${password}&folder=0`;

    fetch(apiUrl)
      .then(res => res.json())
      .then(data => {
        console.log("API RESPONSE:", data); // 👈 debug

        const container = document.getElementById("videoList");
        const status = document.getElementById("status");

        // ❌ No result
        if (!data.result) {
          status.innerHTML = "API error or blocked (check console)";
          return;
        }

        const files = data.result.files;

        // ❌ Empty list
        if (!files || files.length === 0) {
          status.innerHTML = "No videos found.";
          return;
        }

        // ✅ Success
        status.innerHTML = `Found ${files.length} episode(s)`;

        files.forEach((video, index) => {
          const div = document.createElement("div");

          div.className = "bg-gray-800 p-4 rounded-xl shadow hover:bg-gray-700 transition";

          div.innerHTML = `
            <h2 class="text-lg font-semibold mb-1">
              Episode ${index + 1}: ${video.name}
            </h2>

            <p class="text-sm text-gray-400 mb-2">
              Size: ${Math.round(video.size / (1024 * 1024))} MB
            </p>

            <a href="https://streamtape.com/v/${video.linkid}"
               target="_blank"
               class="inline-block bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm">
               ▶ Watch Episode
            </a>
          `;

          container.appendChild(div);
        });
      })
      .catch(err => {
        console.error("FETCH ERROR:", err);

        document.getElementById("status").innerHTML =
          "Error loading videos (check console)";
      });
  </script>

</body>
</html>
