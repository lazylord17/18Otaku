<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Episodes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-900 text-white min-h-screen p-6">

  <h1 class="text-3xl font-bold mb-6">Anime Episodes</h1>

  <p id="status" class="text-gray-400 mb-4">Loading...</p>

  <div id="videoList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
    <div class="text-center col-span-full">Loading...</div>
  </div>

  <script>
    // 🔐 Encoded credentials
    const encodedUser = "Y2VlZDRmZWM2ZjU1MWY0Y2NjNWI=";
    const encodedPass = "YnplMDhScExRbGNQdlpS";

    function decode(str) {
      return atob(str);
    }

    const username = decode(encodedUser);
    const password = decode(encodedPass);

    // ✅ IMPORTANT CHANGE
    const apiUrl = `https://api.streamtape.com/file/listfolder?login=${username}&key=${password}`;

    fetch(apiUrl)
      .then(res => res.json())
      .then(data => {
        console.log("API RESPONSE:", data);

        const container = document.getElementById("videoList");
        const status = document.getElementById("status");

        if (!data.result || !data.result.files) {
          status.innerHTML = "API error or no data.";
          container.innerHTML = "";
          return;
        }

        const files = data.result.files;

        if (files.length === 0) {
          status.innerHTML = "No videos found.";
          container.innerHTML = "";
          return;
        }

        status.innerHTML = `Found ${files.length} episode(s)`;

        container.innerHTML = "";

        files.forEach((video, index) => {
          const thumb = `https://thumb.tapecontent.net/thumb/${video.linkid}/1.jpg`;

          const div = document.createElement("div");

          div.className = "bg-gray-800 rounded-xl overflow-hidden shadow hover:scale-105 transition cursor-pointer";

          div.innerHTML = `
            <img src="${thumb}" 
                 class="w-full h-48 object-cover"
                 onerror="this.src='https://via.placeholder.com/400x225?text=No+Image'">

            <div class="p-3">
              <h2 class="font-semibold text-sm mb-2">
                Episode ${index + 1}
              </h2>

              <button onclick="openPlayer('${video.linkid}')"
                class="w-full bg-blue-500 hover:bg-blue-600 py-2 rounded-lg text-sm">
                ▶ Watch
              </button>
            </div>
          `;

          container.appendChild(div);
        });
      })
      .catch(err => {
        console.error("ERROR:", err);

        document.getElementById("status").innerHTML =
          "Blocked or failed (check console)";
      });

    // 🎬 Simple player popup
    function openPlayer(id) {
      const url = `https://streamtape.com/e/${id}`;
      window.open(url, "_blank");
    }
  </script>

</body>
</html>
