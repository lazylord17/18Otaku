<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Anime Titles</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">

  <h1 class="text-2xl font-bold mb-6">Anime List</h1>
  <div id="container" class="space-y-3"></div>

  <script>
    const JSON_URL = "https://raw.githubusercontent.com/lazylord17/streamtape-json/main/streamtape_videos.json";
    const TMDB_KEY = process.env.TMDB_API_KEY; // Replace with your TMDB API key

    const container = document.getElementById("container");
    const seen = new Set();
    const cache = new Map();
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    // ---------------- AniList ----------------
    async function getAniListTitle(mal_id, anilist_id) {
      try {
        let query, variables;
        if (mal_id) {
          query = `
            query ($idMal: Int) {
              Media(idMal: $idMal, type: ANIME) {
                title { romaji english }
              }
            }`;
          variables = { idMal: mal_id };
        } else {
          query = `
            query ($id: Int) {
              Media(id: $id, type: ANIME) {
                title { romaji english }
              }
            }`;
          variables = { id: anilist_id };
        }

        const res = await fetch("https://graphql.anilist.co", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ query, variables })
        });
        const json = await res.json();
        const media = json.data?.Media;
        return media?.title?.english || media?.title?.romaji || null;
      } catch {
        return null;
      }
    }

    // ---------------- TMDB Movie ----------------
    async function getTMDBMovie(id) {
      try {
        const res = await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${TMDB_KEY}`);
        const data = await res.json();
        if (data.success === false) return null;
        return data.title || null;
      } catch {
        return null;
      }
    }

    // ---------------- TMDB Series ----------------
    async function getTMDBSeries(id) {
      try {
        const res = await fetch(`https://api.themoviedb.org/3/tv/${id}?api_key=${TMDB_KEY}`);
        const data = await res.json();
        if (data.success === false) return null;
        return data.name || null;
      } catch {
        return null;
      }
    }

    // ---------------- TMDB Search fallback ----------------
    async function searchTMDB(query) {
      try {
        const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(query)}`);
        const data = await res.json();
        if (data.results && data.results.length > 0) {
          const item = data.results[0];
          return item.title || item.name || null;
        }
      } catch {
        return null;
      }
    }

    // ---------------- Load Anime ----------------
    async function loadAnime() {
      const res = await fetch(JSON_URL);
      const data = await res.json();

      for (const file of data.files) {
        const uniqueId = file.mal_id || file.anilist_id || file.tmdb_id || file.tmdbs_id;
        if (!uniqueId || seen.has(uniqueId)) continue;
        seen.add(uniqueId);

        if (cache.has(uniqueId)) {
          render(cache.get(uniqueId));
          continue;
        }

        let title = null;

        // 1️⃣ AniList
        if (file.mal_id || file.anilist_id) {
          title = await getAniListTitle(file.mal_id, file.anilist_id);
          await sleep(120);
        }

        // 2️⃣ TMDB Movie
        if (!title && file.tmdb_id) {
          title = await getTMDBMovie(file.tmdb_id);
          await sleep(120);
          if (!title) title = await getTMDBSeries(file.tmdb_id);
        }

        // 3️⃣ TMDB Series
        if (!title && file.tmdbs_id) {
          title = await getTMDBSeries(file.tmdbs_id);
          await sleep(120);
          if (!title) title = await getTMDBMovie(file.tmdbs_id);
        }

        // 4️⃣ TMDB Search fallback
        if (!title && (file.tmdb_id || file.tmdbs_id)) {
          title = await searchTMDB(file.tmdb_id || file.tmdbs_id);
        }

        // 5️⃣ Final fallback
        if (!title) {
          title = "Unknown Anime";
        }

        cache.set(uniqueId, title);
        render(title);
      }
    }

    // ---------------- Render ----------------
    function render(title) {
      const div = document.createElement("div");
      div.className = "p-4 bg-gray-800 rounded hover:bg-gray-700 transition";
      div.textContent = title;
      container.appendChild(div);
    }

    loadAnime();
  </script>

</body>
</html>
